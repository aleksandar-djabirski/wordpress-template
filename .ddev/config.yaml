# This file is hand-maintained (not generated by `ddev config`), because the
# host environment used to build this repo does not have the ddev CLI
# installed. Verify it with `ddev config` / `ddev start` once ddev is
# available; do not add a `#ddev-generated` marker, since ddev will then
# consider it safe to overwrite.
#
# Bedrock manages its own WordPress configuration via .env
# (see config/application.php), so DDEV's normal wp-config.php management
# is turned off below.
name: agency-starter
type: wordpress
docroot: web
php_version: "8.3"
webserver_type: nginx-fpm
database:
  type: mariadb
  version: "10.11"
nodejs_version: "22"
disable_settings_management: true
